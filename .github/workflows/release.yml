name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:

jobs:
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      build: ${{ steps.version.outputs.build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Extraire la version depuis le tag (ex: v1.2.3 → 1.2.3) ──────────
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          # ApplicationVersion = build number = nombre de commits
          BUILD=$(git rev-list --count HEAD)
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"

  build:
    name: Build & Sign Android (${{ matrix.config }})
    needs: version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config: [Alpha, Beta, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET & MAUI ───────────────────────────────────────────────────────
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install .NET MAUI workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore "Invoice Shelf/Invoice Shelf.csproj"

      # ── Keystore (stocké dans les secrets GitHub) ─────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${{ runner.temp }}/invoiceshelf.keystore"

      # ── Build & Sign ───────────────────────────────────────────────────────
      - name: Build & Sign (${{ matrix.config }})
        run: >
          dotnet publish "Invoice Shelf/Invoice Shelf.csproj"
          --configuration ${{ matrix.config }}
          --framework net10.0-android
          --no-restore
          -p:AndroidKeyStore=true
          -p:AndroidSigningKeyStore="${{ runner.temp }}/invoiceshelf.keystore"
          -p:AndroidSigningKeyAlias="${{ secrets.KEY_ALIAS }}"
          -p:AndroidSigningKeyPass="${{ secrets.KEY_PASSWORD }}"
          -p:AndroidSigningStorePass="${{ secrets.KEYSTORE_PASSWORD }}"
          -p:ApplicationDisplayVersion="${{ needs.version.outputs.version }}"
          -p:ApplicationVersion="${{ needs.version.outputs.build }}"

      # ── Trouver et renommer l'APK/AAB signé ───────────────────────────────
      - name: Locate & rename signed artifacts
        id: artifacts
        run: |
          OUT_DIR="Invoice Shelf/bin/${{ matrix.config }}/net10.0-android"
          APK_SRC=$(find "$OUT_DIR" -name "*Signed*.apk" | head -1)
          AAB_SRC=$(find "$OUT_DIR" -name "*.aab"        | head -1)

          APK_DST="$OUT_DIR/InvoiceShelf-${{ matrix.config }}-${{ needs.version.outputs.tag }}.apk"
          AAB_DST="$OUT_DIR/InvoiceShelf-${{ matrix.config }}-${{ needs.version.outputs.tag }}.aab"

          cp "$APK_SRC" "$APK_DST"
          cp "$AAB_SRC" "$AAB_DST"

          echo "apk=${APK_DST}" >> "$GITHUB_OUTPUT"
          echo "aab=${AAB_DST}" >> "$GITHUB_OUTPUT"
          echo "APK : ${APK_DST}"
          echo "AAB : ${AAB_DST}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.config }}
          path: |
            ${{ steps.artifacts.outputs.apk }}
            ${{ steps.artifacts.outputs.aab }}
          retention-days: 7
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: android-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts

      # ── Créer la GitHub Release ───────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Invoice Shelf Mobile ${{ needs.version.outputs.tag }}"
          body: |
            ## Invoice Shelf Mobile ${{ needs.version.outputs.tag }}

            ### Builds disponibles
            - **Alpha** : `InvoiceShelf-Alpha-${{ needs.version.outputs.tag }}.apk` / `.aab`
            - **Beta** : `InvoiceShelf-Beta-${{ needs.version.outputs.tag }}.apk` / `.aab`
            - **Release** : `InvoiceShelf-Release-${{ needs.version.outputs.tag }}.apk` / `.aab`

            ### Installation
            Téléchargez le fichier `.apk` correspondant ci-dessous et installez-le sur votre appareil Android.
            Les fichiers `.aab` sont destinés à la publication sur le Play Store.

            > **Note :** L'installation depuis une source inconnue doit être autorisée dans les paramètres de votre appareil.

            ### Changelog
            Voir les [commits](https://github.com/${{ github.repository }}/commits/${{ needs.version.outputs.tag }}) pour le détail des changements.
          draft: false
          prerelease: ${{ contains(needs.version.outputs.tag, '-') }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

